name: CI/CD — Scoring API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Job 1 : Tests ────────────────────────────────────────────
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Lancement des tests avec couverture
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing

  # ─── Job 2 : Build Docker ─────────────────────────────────────
  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: |
          docker build -t scoring-api:latest .

      - name: Test du container
        run: |
          docker run -d -p 8000:8000 --name scoring-test scoring-api:latest
          sleep 5
          curl -f http://localhost:8000/health
          docker stop scoring-test
          docker rm scoring-test

  # ─── Job 3 : Deploy Hugging Face ──────────────────────────────
  deploy:
    name: Deploy sur Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Push vers Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git push --force https://UserMarrakech:$HF_TOKEN@huggingface.co/spaces/UserMarrakech/scoring-api main
