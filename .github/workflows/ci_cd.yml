name: CI/CD — Scoring API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt pytest pytest-cov httpx
      - run: pytest tests/ -v --cov=app --cov-report=term-missing

  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Téléchargement des artefacts modèle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p model
          gh release download v0.1.0-model \
            --repo Marrackech/scoring-mlops-deployment \
            --dir model/

      - name: Build image Docker
        run: docker build -t scoring-api:latest .

      - name: Démarrage container
        run: docker run -d -p 7860:7860 --name scoring-test scoring-api:latest

      - name: Attente démarrage
        run: sleep 20

      - name: Logs du container
        run: docker logs scoring-test

      - name: Test santé API
        run: curl -f http://localhost:7860/health

      - name: Arrêt container
        run: |
          docker stop scoring-test
          docker rm scoring-test

  deploy:
    name: Deploy sur Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push vers Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://UserMarrakech:$HF_TOKEN@huggingface.co/spaces/UserMarrakech/scoring-api
          git push hf main --force
